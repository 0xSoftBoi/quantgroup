[compiler.solc]
exclude_paths = ["lib", "venv", ".venv", "test", "node_modules", "script"]
include_paths = ["tests/contracts"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "erc4626-tests/=lib/openzeppelin-contracts/lib/erc4626-tests/",
    "halmos-cheatcodes/=lib/openzeppelin-contracts/lib/halmos-cheatcodes/src/",
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
]
via_IR = false

[compiler.solc.optimizer]
enabled = false
runs = 200

[compiler.solc.metadata]
append_CBOR = true
use_literal_content = false
bytecode_hash = "ipfs"

[detectors]
exclude = []
ignore_paths = [".venv", "test", "venv"]
exclude_paths = ["lib", "venv", ".venv", "test", "node_modules", "script"]

[testing]
cmd = "anvil"

[testing.anvil]
cmd_args = "--prune-history 100 --transaction-block-keeper 10 --steps-tracing --silent"

[testing.ganache]
cmd_args = "-k istanbul -q"

[testing.hardhat]
cmd_args = ""